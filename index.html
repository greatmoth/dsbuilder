<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Skill DB Builder</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        #header { width: 100%; padding: 20px; background: #1f1f1f; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10; }
        button { padding: 10px 20px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-save { background: #4a90e2; color: white; }
        .btn-load { background: #43a047; color: white; }
        .btn-reset { background: #e53935; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        canvas { background: #181818; box-shadow: 0 4px 20px rgba(0,0,0,0.5); margin: 20px 0; cursor: pointer; border-radius: 12px; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; z-index: 100; font-size: 1.5rem; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">CSV 데이터를 불러오는 중...</div>

<div id="header">
    <button class="btn-save" onclick="saveData()">로컬 스토리지에 저장</button>
    <button class="btn-load" onclick="loadData()">불러오기</button>
    <button class="btn-reset" onclick="resetAll()">초기화</button>
</div>

<canvas id="appCanvas"></canvas>

<script>
const canvas = document.getElementById('appCanvas');
const ctx = canvas.getContext('2d');
const loading = document.getElementById('loading');

// --- 환경 변수 및 설정 ---
let monsterData = []; 
let selections = []; // 유저가 선택한 몬스터/스킬 정보

const UI = {
    canvasWidth: 1200,
    canvasHeight: 900,
    sidebarWidth: 220,
    cardWidth: 185,
    margin: 15,
    colors: {
        bg: "#181818",
        card: "#252525",
        primary: "#4a90e2",
        active: "#4caf50",
        passive: "#ff9800",
        text: "#ffffff",
        textDim: "#aaaaaa",
        traitSelected: "#f1c40f"
    }
};

// --- 초기화 함수 ---
async function init() {
    canvas.width = UI.canvasWidth;
    canvas.height = UI.canvasHeight;

    try {
        /* [CSV 파일 주소 넣는 법]
           1. 동일 서버 내 파일: 'mondb.csv'
           2. 외부 주소: 'https://example.com/data.csv' (CORS 설정 필요)
           3. 깃허브 등: 'https://raw.githubusercontent.com/user/repo/main/mondb.csv'
        */
        const response = await fetch('https://github.com/greatmoth/dsbuilder/blob/main/mondb.csv'); 
        if (!response.ok) throw new Error("파일을 찾을 수 없습니다.");
        
        const csvText = await response.text();
        parseCSV(csvText);
        
        loading.style.display = 'none';
        render();
    } catch (err) {
        console.error(err);
        loading.innerText = "데이터 로드 실패: " + err.message;
    }
}

// --- CSV 파서 ---
function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    lines.forEach(line => {
        const row = line.split(',');
        if (row.length < 3) return;

        const monsterName = row[0].trim();
        const type = row[1].trim(); // 액티브 or 패시브
        const skillName = row[2].trim();
        const traits = row.slice(3).map(t => t.trim()).filter(t => t !== "");

        monsterData.push({
            monsterName,
            type,
            skillName,
            traits
        });
    });
}

// --- 그리기 함수 ---
function render() {
    ctx.fillStyle = UI.colors.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 1. 좌측 몬스터 목록
    drawSidebar();

    // 2. 우측 선택된 몬스터 상세
    drawSelectedMonsters();
}

function drawSidebar() {
    ctx.fillStyle = "#1f1f1f";
    ctx.fillRect(0, 0, UI.sidebarWidth, canvas.height);
    
    ctx.fillStyle = UI.colors.text;
    ctx.font = "bold 16px Arial";
    ctx.fillText("몬스터 도감 (최대 5개)", 20, 40);

    const uniqueMonsters = [...new Set(monsterData.map(d => d.monsterName))];
    uniqueMonsters.forEach((m, i) => {
        const y = 70 + (i * 45);
        const isSelected = selections.some(s => s.name === m);

        ctx.fillStyle = isSelected ? UI.colors.primary : "#333";
        ctx.beginPath();
        ctx.roundRect(15, y, UI.sidebarWidth - 30, 35, 6);
        ctx.fill();

        ctx.fillStyle = UI.colors.text;
        ctx.font = "14px Arial";
        ctx.fillText(m, 30, y + 22);
    });
}

function drawSelectedMonsters() {
    selections.forEach((sel, idx) => {
        const x = UI.sidebarWidth + UI.margin + (idx * (UI.cardWidth + UI.margin));
        let y = 30;

        // 배경 카드
        ctx.fillStyle = UI.colors.card;
        ctx.beginPath();
        ctx.roundRect(x, y, UI.cardWidth, canvas.height - 60, 10);
        ctx.fill();

        // 몬스터 이름
        ctx.fillStyle = UI.colors.primary;
        ctx.font = "bold 18px Arial";
        ctx.fillText(sel.name, x + 15, y + 30);
        y += 50;

        // 해당 몬스터의 전체 스킬 정보
        const allSkills = monsterData.filter(d => d.monsterName === sel.name);

        allSkills.forEach(skill => {
            const isSelected = (skill.type === '액티브') 
                ? sel.actives.some(a => a.name === skill.skillName)
                : sel.passives.some(p => p.name === skill.skillName);

            // 스킬 버튼
            ctx.fillStyle = isSelected ? (skill.type === '액티브' ? UI.colors.active : UI.colors.passive) : "#444";
            ctx.beginPath();
            ctx.roundRect(x + 10, y, UI.cardWidth - 20, 28, 4);
            ctx.fill();

            ctx.fillStyle = "#fff";
            ctx.font = "12px Arial";
            ctx.fillText(`[${skill.type[0]}] ${skill.skillName}`, x + 15, y + 18);
            y += 35;

            // 특성 리스트 (스킬이 선택된 상태일 때만)
            if (isSelected) {
                skill.traits.forEach((trait, tIdx) => {
                    let isPicked = false;
                    if(skill.type === '액티브') {
                        const sObj = sel.actives.find(a => a.name === skill.skillName);
                        isPicked = sObj.traits.includes(tIdx);
                    } else {
                        const sObj = sel.passives.find(p => p.name === skill.skillName);
                        isPicked = sObj.trait === tIdx;
                    }

                    ctx.fillStyle = isPicked ? UI.colors.traitSelected : "#222";
                    ctx.beginPath();
                    ctx.roundRect(x + 15, y, UI.cardWidth - 30, 22, 3);
                    ctx.fill();
                    
                    ctx.fillStyle = isPicked ? "#000" : "#888";
                    ctx.font = "10px Arial";
                    const shortTrait = trait.length > 18 ? trait.substring(0, 16) + ".." : trait;
                    ctx.fillText(shortTrait, x + 20, y + 15);
                    y += 26;
                });
                y += 10;
            }
        });
    });
}

// --- 클릭 인터랙션 ---
canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    // 1. 사이드바 클릭 (몬스터 추가/제거)
    if (x < UI.sidebarWidth) {
        const uniqueMonsters = [...new Set(monsterData.map(d => d.monsterName))];
        uniqueMonsters.forEach((m, i) => {
            const my = 70 + (i * 45);
            if (y > my && y < my + 35) toggleMonster(m);
        });
    } 
    // 2. 상세 카드 클릭
    else {
        selections.forEach((sel, idx) => {
            const cardX = UI.sidebarWidth + UI.margin + (idx * (UI.cardWidth + UI.margin));
            if (x > cardX && x < cardX + UI.cardWidth) {
                handleCardClick(sel, x - cardX, y);
            }
        });
    }
    render();
});

function toggleMonster(name) {
    const idx = selections.findIndex(s => s.name === name);
    if (idx > -1) selections.splice(idx, 1);
    else if (selections.length < 5) selections.push({ name, actives: [], passives: [] });
}

function handleCardClick(sel, localX, globalY) {
    const allSkills = monsterData.filter(d => d.monsterName === sel.name);
    let currentY = 80;

    allSkills.forEach(skill => {
        // 스킬 헤더 클릭
        if (globalY > currentY && globalY < currentY + 28) {
            toggleSkill(sel, skill);
        }

        const isSelected = (skill.type === '액티브') 
            ? sel.actives.some(a => a.name === skill.skillName)
            : sel.passives.some(p => p.name === skill.skillName);

        if (isSelected) {
            currentY += 35;
            skill.traits.forEach((trait, tIdx) => {
                if (globalY > currentY && globalY < currentY + 22) {
                    toggleTrait(sel, skill, tIdx);
                }
                currentY += 26;
            });
            currentY += 10;
        } else {
            currentY += 35;
        }
    });
}

function toggleSkill(sel, skill) {
    if (skill.type === '액티브') {
        const idx = sel.actives.findIndex(a => a.name === skill.skillName);
        if (idx > -1) sel.actives.splice(idx, 1);
        else if (sel.actives.length < 3) sel.actives.push({ name: skill.skillName, traits: [] });
    } else {
        const idx = sel.passives.findIndex(p => p.name === skill.skillName);
        if (idx > -1) sel.passives.splice(idx, 1);
        else if (sel.passives.length < 3) sel.passives.push({ name: skill.skillName, trait: null });
    }
}

function toggleTrait(sel, skill, tIdx) {
    if (skill.type === '액티브') {
        const sObj = sel.actives.find(a => a.name === skill.skillName);
        const has = sObj.traits.indexOf(tIdx);
        if (has > -1) sObj.traits.splice(has, 1);
        else if (sObj.traits.length < 3) sObj.traits.push(tIdx);
    } else {
        const sObj = sel.passives.find(p => p.name === skill.skillName);
        sObj.trait = (sObj.trait === tIdx) ? null : tIdx;
    }
}

// --- 데이터 영속성 ---
function saveData() {
    localStorage.setItem('monster_build_save', JSON.stringify(selections));
    showToast("로컬 스토리지에 저장 완료!");
}

function loadData() {
    const saved = localStorage.getItem('monster_build_save');
    if (saved) {
        selections = JSON.parse(saved);
        render();
        showToast("이전 데이터를 불러왔습니다.");
    } else {
        showToast("저장된 데이터가 없습니다.");
    }
}

function resetAll() {
    if(confirm("모든 선택을 초기화할까요?")) {
        selections = [];
        render();
    }
}

function showToast(msg) {
    const toast = document.createElement('div');
    toast.innerText = msg;
    toast.style = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; z-index:1000;";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

// 시작
init();
</script>

</body>
</html>
