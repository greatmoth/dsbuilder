<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Skill DB Builder</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow-x: hidden; }
        #header { width: 100%; padding: 15px; background: #1f1f1f; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10; }
        button { padding: 8px 16px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-save { background: #4a90e2; color: white; }
        .btn-load { background: #43a047; color: white; }
        .btn-reset { background: #e53935; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        canvas { background: #181818; box-shadow: 0 4px 20px rgba(0,0,0,0.5); margin: 20px 0; cursor: default; border-radius: 12px; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">데이터를 분석하고 UI를 구성 중입니다...</div>

<div id="header">
    <button class="btn-save" onclick="saveData()">설정 저장</button>
    <button class="btn-load" onclick="loadData()">불러오기</button>
    <button class="btn-reset" onclick="resetAll()">초기화</button>
</div>

<canvas id="appCanvas"></canvas>

<script>
const canvas = document.getElementById('appCanvas');
const ctx = canvas.getContext('2d');
const loading = document.getElementById('loading');

// --- 데이터 및 상태 ---
let monsterData = []; 
let monstersList = []; 
let slots = Array.from({ length: 5 }, () => ({
    name: null,
    actives: Array.from({ length: 3 }, () => ({ name: null, traits: [] })),
    passives: Array.from({ length: 3 }, () => ({ name: null, trait: null }))
}));

let activeDropdown = null; 

const UI = {
    canvasWidth: 1350,
    canvasHeight: 1100,
    slotWidth: 250,
    margin: 15,
    selectorY: 25,
    slotY: 90,
    colors: {
        bg: "#181818",
        slot: "#252525",
        dropdown: "#333333",
        dropdownHover: "#444444",
        primary: "#4a90e2",
        active: "#4caf50",
        passive: "#ff9800",
        text: "#ffffff",
        textDim: "#aaaaaa",
        trait: "#f1c40f",
        headerBg: "#1f1f1f",
        locked: "#555",
        traitBg: "#1a1a1a"
    }
};

async function init() {
    canvas.width = UI.canvasWidth;
    canvas.height = UI.canvasHeight;

    try {
        const response = await fetch('mondb.csv'); 
        if (!response.ok) throw new Error("파일 로드 실패");
        
        const csvText = await response.text();
        parseCSV(csvText);
        
        monstersList = [...new Set(monsterData.map(d => d.monsterName))].sort();
        loading.style.display = 'none';
        render();
    } catch (err) {
        loading.innerText = "Error: " + err.message;
    }
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    lines.forEach(line => {
        const row = line.split(',');
        if (row.length < 3) return;
        const traits = row.slice(3).map(t => t.trim()).filter(t => t !== "");
        monsterData.push({
            monsterName: row[0].trim(),
            type: row[1].trim(),
            skillName: row[2].trim(),
            traits
        });
    });
}

function wrapText(text, maxWidth, fontSize) {
    ctx.font = `${fontSize}px Arial`;
    const words = text.split(' ');
    const lines = [];
    let currentLine = words[0];

    for (let i = 1; i < words.length; i++) {
        const word = words[i];
        const width = ctx.measureText(currentLine + " " + word).width;
        if (width < maxWidth) {
            currentLine += " " + word;
        } else {
            lines.push(currentLine);
            currentLine = word;
        }
    }
    lines.push(currentLine);
    return lines;
}

function render() {
    ctx.fillStyle = UI.colors.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const startX = (canvas.width - (UI.slotWidth * 5 + UI.margin * 4)) / 2;

    slots.forEach((slot, i) => {
        const x = startX + i * (UI.slotWidth + UI.margin);
        
        ctx.fillStyle = UI.colors.headerBg;
        ctx.beginPath();
        ctx.roundRect(x, UI.selectorY, UI.slotWidth, 50, 8);
        ctx.fill();

        drawDropdownButton(x, UI.selectorY + 5, UI.slotWidth, 40, slot.name || "몬스터 선택", UI.colors.primary, false, false, true);

        drawSlot(slot, i, x, UI.slotY);
    });

    if (activeDropdown) drawDropdown();
}

function drawSlot(slot, idx, x, y) {
    ctx.fillStyle = UI.colors.slot;
    ctx.beginPath();
    ctx.roundRect(x, y, UI.slotWidth, canvas.height - y - 30, 12);
    ctx.fill();

    if (!slot.name) {
        ctx.fillStyle = "#333";
        ctx.font = "italic 13px Arial";
        ctx.textAlign = "center";
        ctx.fillText("몬스터를 선택하세요", x + UI.slotWidth/2, y + 50);
        ctx.textAlign = "left";
        return;
    }

    let currentY = y + 25;
    const monsterSkills = monsterData.filter(d => d.monsterName === slot.name);
    const activePool = monsterSkills.filter(s => s.type === '액티브');
    const passivePool = monsterSkills.filter(s => s.type === '패시브');

    // 1. 액티브 섹션
    ctx.fillStyle = UI.colors.active;
    ctx.font = "bold 13px Arial";
    ctx.fillText("ACTIVE SKILLS", x + 15, currentY);
    currentY += 15;

    slot.actives.forEach((skill, sIdx) => {
        const isFixed = (sIdx === 0);
        const btnColor = isFixed ? UI.colors.locked : "#fff";
        
        const blockHeight = drawWrappedButton(x + 10, currentY, UI.slotWidth - 20, skill.name || "스킬 선택", btnColor, 12, true, !isFixed);
        currentY += blockHeight + 6;
        
        if (skill.name) {
            const skillInfo = activePool.find(p => p.skillName === skill.name);
            if (skillInfo) {
                const traitsData = [];
                let totalTraitsHeight = 0;
                for(let tPos = 0; tPos < 3; tPos++) {
                    const tIdx = skill.traits[tPos];
                    const tName = (tIdx !== undefined && tIdx !== null) ? skillInfo.traits[tIdx] : "특성 선택";
                    const lines = wrapText(tName, UI.slotWidth - 55, 11);
                    const h = Math.max(28, lines.length * 15 + 16);
                    traitsData.push({ tName, h, lines });
                    totalTraitsHeight += h;
                }

                ctx.fillStyle = UI.colors.traitBg;
                ctx.beginPath();
                ctx.roundRect(x + 15, currentY, UI.slotWidth - 30, totalTraitsHeight, 6);
                ctx.fill();
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 1;
                ctx.stroke();

                let traitY = currentY;
                traitsData.forEach((td, tdIdx) => {
                    ctx.fillStyle = (td.tName === "특성 선택") ? UI.colors.textDim : UI.colors.trait;
                    ctx.font = "11px Arial";
                    td.lines.forEach((line, li) => {
                        ctx.fillText(line, x + 25, traitY + 8 + 11 + (li * 15) - 2);
                    });

                    ctx.beginPath();
                    ctx.moveTo(x + UI.slotWidth - 30, traitY + td.h/2 - 2);
                    ctx.lineTo(x + UI.slotWidth - 25, traitY + td.h/2 + 3);
                    ctx.lineTo(x + UI.slotWidth - 20, traitY + td.h/2 - 2);
                    ctx.strokeStyle = (td.tName === "특성 선택") ? UI.colors.textDim : UI.colors.trait;
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    traitY += td.h;
                    if(tdIdx < 2) {
                        ctx.beginPath();
                        ctx.moveTo(x + 20, traitY);
                        ctx.lineTo(x + UI.slotWidth - 20, traitY);
                        ctx.strokeStyle = "#2a2a2a";
                        ctx.stroke();
                    }
                });
                currentY += totalTraitsHeight;
            }
        }
        currentY += 8;
    });

    currentY += 10;

    // 2. 패시브 섹션
    ctx.fillStyle = UI.colors.passive;
    ctx.font = "bold 13px Arial";
    ctx.fillText("PASSIVE SKILLS", x + 15, currentY);
    currentY += 15;

    slot.passives.forEach((skill, sIdx) => {
        const blockHeight = drawWrappedButton(x + 10, currentY, UI.slotWidth - 20, skill.name || "스킬 선택", "#fff", 12, true, true);
        currentY += blockHeight + 6;
        
        if (skill.name) {
            const skillInfo = passivePool.find(p => p.skillName === skill.name);
            if (skillInfo) {
                const tIdx = skill.trait;
                const tName = (tIdx !== null && tIdx !== undefined) ? skillInfo.traits[tIdx] : "특성 선택";
                const tHeight = drawWrappedButton(x + 15, currentY, UI.slotWidth - 30, tName, UI.colors.trait, 11, false, true, true);
                currentY += tHeight + 4;
            }
        }
        currentY += 8;
    });
}

function drawWrappedButton(x, y, w, text, color, fontSize, isBold, showArrow, isTrait = false) {
    const padding = 8;
    const innerWidth = w - (showArrow ? 25 : 15);
    const lines = wrapText(text, innerWidth, fontSize);
    const lineHeight = fontSize + 4;
    const rectHeight = Math.max(28, lines.length * lineHeight + padding * 2);

    if (isTrait) {
        ctx.fillStyle = UI.colors.traitBg;
        ctx.beginPath();
        ctx.roundRect(x, y, w, rectHeight, 6);
        ctx.fill();
        
        if (text !== "특성 선택") {
            ctx.strokeStyle = UI.colors.trait;
            ctx.lineWidth = 1;
            ctx.stroke();
        } else {
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 1;
            ctx.stroke();
        }
    } else if (!showArrow) {
        ctx.fillStyle = "transparent";
    }

    ctx.fillStyle = (text === "특성 선택" || text === "스킬 선택") ? UI.colors.textDim : color;
    ctx.font = `${isBold ? 'bold ' : ''}${fontSize}px Arial`;
    ctx.textAlign = "left";
    
    lines.forEach((line, i) => {
        ctx.fillText(line, x + 10, y + padding + fontSize + (i * lineHeight) - 2);
    });

    if (showArrow) {
        ctx.beginPath();
        ctx.moveTo(x + w - 15, y + rectHeight / 2 - 2);
        ctx.lineTo(x + w - 10, y + rectHeight / 2 + 3);
        ctx.lineTo(x + w - 5, y + rectHeight / 2 - 2);
        ctx.strokeStyle = (text === "특성 선택" || text === "스킬 선택") ? UI.colors.textDim : color;
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    return rectHeight;
}

function drawDropdownButton(x, y, w, h, text, color, isSmall, isTrait, isGhost) {
    ctx.fillStyle = (text === "몬스터 선택") ? UI.colors.textDim : color;
    ctx.font = "bold 14px Arial";
    ctx.textAlign = "left";
    ctx.fillText(text, x + 15, y + h / 2 + 5);
    
    ctx.beginPath();
    ctx.moveTo(x + w - 20, y + h / 2 - 2);
    ctx.lineTo(x + w - 15, y + h / 2 + 3);
    ctx.lineTo(x + w - 10, y + h / 2 - 2);
    ctx.strokeStyle = (text === "몬스터 선택") ? UI.colors.textDim : color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
}

function drawDropdown() {
    const { x, y, width, items } = activeDropdown;
    const padding = 10;
    const fontSize = 12;
    const lineHeight = 16;
    const maxVisibleHeight = 400;

    // 항목별 높이 계산
    const itemData = items.map(item => {
        const label = item.name !== undefined ? item.name : item;
        const lines = wrapText(label, width - 24, fontSize);
        const height = lines.length * lineHeight + 18;
        return { label, lines, height };
    });

    const totalHeight = itemData.reduce((acc, cur) => acc + cur.height, 0);
    const drawHeight = Math.min(totalHeight, maxVisibleHeight);

    ctx.save();
    ctx.shadowBlur = 15;
    ctx.shadowColor = "rgba(0,0,0,0.5)";
    ctx.fillStyle = UI.colors.dropdown;
    ctx.beginPath();
    ctx.roundRect(x, y, width, drawHeight, 8);
    ctx.fill();
    ctx.restore();

    // 스크롤 영역 클리핑 (간단하게 상위 항목만 표시)
    let currentItemY = y;
    for (let i = 0; i < itemData.length; i++) {
        const item = itemData[i];
        if (currentItemY + item.height > y + drawHeight) break;

        // 항목 텍스트
        ctx.fillStyle = "#fff";
        ctx.font = `${fontSize}px Arial`;
        item.lines.forEach((line, lineIdx) => {
            ctx.fillText(line, x + 12, currentItemY + 18 + (lineIdx * lineHeight));
        });

        currentItemY += item.height;

        // 구분선
        if (i < itemData.length - 1 && currentItemY < y + drawHeight) {
            ctx.strokeStyle = "#444";
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(x + 5, currentItemY);
            ctx.lineTo(x + width - 5, currentItemY);
            ctx.stroke();
        }
        
        // 클릭 영역 정보를 위해 itemData에 y좌표 저장
        item.yStart = currentItemY - item.height;
        item.yEnd = currentItemY;
    }
    
    // 드롭다운 객체에 레이아웃 정보 업데이트 (클릭 핸들링용)
    activeDropdown.layout = itemData;
    activeDropdown.actualHeight = drawHeight;
}

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (activeDropdown) {
        const { x, y, width, items, layout, actualHeight } = activeDropdown;

        if (mx >= x && mx <= x + width && my >= y && my <= y + actualHeight) {
            // 레이아웃 정보를 바탕으로 어떤 항목이 클릭되었는지 확인
            const clickedItem = layout.find(item => my >= item.yStart && my <= item.yEnd);
            if (clickedItem) {
                const originalItem = items[layout.indexOf(clickedItem)];
                handleDropdownSelect(activeDropdown.slotIdx, activeDropdown.type, originalItem, activeDropdown.skillIdx, activeDropdown.traitSlotIdx);
            }
        }
        activeDropdown = null;
        render();
        return;
    }

    const startX = (canvas.width - (UI.slotWidth * 5 + UI.margin * 4)) / 2;
    slots.forEach((slot, i) => {
        const x = startX + i * (UI.slotWidth + UI.margin);

        if (mx > x && mx < x + UI.slotWidth && my > UI.selectorY && my < UI.selectorY + 50) {
            const used = slots.map(s => s.name).filter(n => n && n !== slot.name);
            activeDropdown = { slotIdx: i, type: 'monster', items: monstersList.filter(m => !used.includes(m)), x: x, y: UI.selectorY + 50, width: UI.slotWidth };
        }

        if (slot.name) {
            let currentY = UI.slotY + 40;
            const monsterSkills = monsterData.filter(d => d.monsterName === slot.name);
            
            slot.actives.forEach((skill, sIdx) => {
                const isFixed = (sIdx === 0);
                const skillLines = wrapText(skill.name || "스킬 선택", UI.slotWidth - 45, 12);
                const blockHeight = Math.max(28, skillLines.length * 16 + 16);
                
                if (!isFixed && mx > x + 10 && mx < x + UI.slotWidth - 10 && my > currentY && my < currentY + blockHeight) {
                    const used = slot.actives.map(a => a.name).filter(n => n && n !== skill.name);
                    const pool = monsterSkills.filter(s => s.type === '액티브' && !used.includes(s.skillName)).map(s => s.skillName);
                    activeDropdown = { slotIdx: i, type: 'active', items: pool, x: x + 10, y: currentY + blockHeight, width: UI.slotWidth - 20, skillIdx: sIdx };
                }
                currentY += blockHeight + 6;

                if (skill.name) {
                    const skillInfo = monsterSkills.find(p => p.skillName === skill.name);
                    if (skillInfo) {
                        for(let tPos = 0; tPos < 3; tPos++) {
                            const tIdx = skill.traits[tPos];
                            const tText = (tIdx !== undefined && tIdx !== null) ? skillInfo.traits[tIdx] : "특성 선택";
                            const tLines = wrapText(tText, UI.slotWidth - 55, 11);
                            const tHeight = Math.max(28, tLines.length * 15 + 16);
                            if (mx > x + 15 && mx < x + UI.slotWidth - 15 && my > currentY && my < currentY + tHeight) {
                                const available = skillInfo.traits.map((t, tid) => ({ name: t, id: tid }));
                                activeDropdown = { slotIdx: i, type: 'activeTrait', items: available, x: x + 15, y: currentY + tHeight, width: UI.slotWidth - 30, skillIdx: sIdx, traitSlotIdx: tPos };
                            }
                            currentY += tHeight;
                        }
                    }
                }
                currentY += 8;
            });

            currentY += 25;

            slot.passives.forEach((skill, sIdx) => {
                const skillLines = wrapText(skill.name || "스킬 선택", UI.slotWidth - 45, 12);
                const blockHeight = Math.max(28, skillLines.length * 16 + 16);
                if (mx > x + 10 && mx < x + UI.slotWidth - 10 && my > currentY && my < currentY + blockHeight) {
                    const used = slot.passives.map(p => p.name).filter(n => n && n !== skill.name);
                    const pool = monsterSkills.filter(s => s.type === '패시브' && !used.includes(s.skillName)).map(s => s.skillName);
                    activeDropdown = { slotIdx: i, type: 'passive', items: pool, x: x + 10, y: currentY + blockHeight, width: UI.slotWidth - 20, skillIdx: sIdx };
                }
                currentY += blockHeight + 6;
                if (skill.name) {
                    const skillInfo = monsterSkills.find(p => p.skillName === skill.name);
                    if (skillInfo) {
                        const tIdx = skill.trait;
                        const tText = (tIdx !== null && tIdx !== undefined) ? skillInfo.traits[tIdx] : "특성 선택";
                        const tLines = wrapText(tText, UI.slotWidth - 45, 11);
                        const tHeight = Math.max(28, tLines.length * 15 + 16);
                        if (mx > x + 15 && mx < x + UI.slotWidth - 15 && my > currentY && my < currentY + tHeight) {
                            const available = skillInfo.traits.map((t, tid) => ({ name: t, id: tid }));
                            activeDropdown = { slotIdx: i, type: 'passiveTrait', items: available, x: x + 15, y: currentY + tHeight, width: UI.slotWidth - 30, skillIdx: sIdx };
                        }
                        currentY += tHeight + 4;
                    }
                }
                currentY += 8;
            });
        }
    });
    render();
});

function handleDropdownSelect(slotIdx, type, value, skillIdx, traitSlotIdx) {
    if (type === 'monster') {
        slots[slotIdx].name = value;
        const monsterSkills = monsterData.filter(d => d.monsterName === value);
        const firstActive = monsterSkills.find(s => s.type === '액티브');
        slots[slotIdx].actives = Array.from({ length: 3 }, () => ({ name: null, traits: [] }));
        if (firstActive) slots[slotIdx].actives[0] = { name: firstActive.skillName, traits: [] };
        slots[slotIdx].passives = Array.from({ length: 3 }, () => ({ name: null, trait: null }));
    } else if (type === 'active') {
        slots[slotIdx].actives[skillIdx] = { name: value, traits: [] };
    } else if (type === 'passive') {
        slots[slotIdx].passives[skillIdx] = { name: value, trait: null };
    } else if (type === 'activeTrait') {
        slots[slotIdx].actives[skillIdx].traits[traitSlotIdx] = value.id;
    } else if (type === 'passiveTrait') {
        slots[slotIdx].passives[skillIdx].trait = value.id;
    }
}

function saveData() { localStorage.setItem('monster_slots_v6', JSON.stringify(slots)); showToast("저장되었습니다."); }
function loadData() { const saved = localStorage.getItem('monster_slots_v6'); if (saved) { slots = JSON.parse(saved); render(); showToast("불러왔습니다."); } }
function resetAll() { if(confirm("초기화할까요?")) { slots = Array.from({ length: 5 }, () => ({ name: null, actives: Array.from({ length: 3 }, () => ({ name: null, traits: [] })), passives: Array.from({ length: 3 }, () => ({ name: null, trait: null })) })); render(); } }
function showToast(msg) {
    const toast = document.createElement('div');
    toast.innerText = msg;
    toast.style = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; z-index:1000; font-size:14px;";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

init();
</script>
</body>
</html>
