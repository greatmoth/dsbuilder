<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Skill DB Builder</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow-x: hidden; }
        #header { width: 100%; padding: 15px; background: #1f1f1f; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10; }
        button { padding: 8px 16px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-save { background: #4a90e2; color: white; }
        .btn-load { background: #43a047; color: white; }
        .btn-reset { background: #e53935; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        canvas { background: #181818; box-shadow: 0 4px 20px rgba(0,0,0,0.5); margin: 20px 0; cursor: default; border-radius: 12px; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">데이터를 분석하고 UI를 구성 중입니다...</div>

<div id="header">
    <button class="btn-save" onclick="saveData()">설정 저장</button>
    <button class="btn-load" onclick="loadData()">불러오기</button>
    <button class="btn-reset" onclick="resetAll()">초기화</button>
</div>

<canvas id="appCanvas"></canvas>

<script>
const canvas = document.getElementById('appCanvas');
const ctx = canvas.getContext('2d');
const loading = document.getElementById('loading');

// --- 데이터 및 상태 ---
let monsterData = []; 
let monstersList = []; 
let slots = Array.from({ length: 5 }, () => ({
    name: null,
    actives: Array.from({ length: 3 }, () => ({ name: null, traits: [] })),
    passives: Array.from({ length: 3 }, () => ({ name: null, trait: null }))
}));

// 드롭다운 상태
let activeDropdown = null; // { slotIdx, type, items, x, y, width, skillIdx, traitSlotIdx }

const UI = {
    canvasWidth: 1300,
    canvasHeight: 950,
    slotWidth: 240,
    margin: 15,
    colors: {
        bg: "#181818",
        slot: "#252525",
        dropdown: "#333333",
        dropdownHover: "#444444",
        primary: "#4a90e2",
        active: "#4caf50",
        passive: "#ff9800",
        text: "#ffffff",
        textDim: "#aaaaaa",
        trait: "#f1c40f"
    }
};

async function init() {
    canvas.width = UI.canvasWidth;
    canvas.height = UI.canvasHeight;

    try {
        const response = await fetch('mondb.csv'); 
        if (!response.ok) throw new Error("파일 로드 실패");
        
        const csvText = await response.text();
        parseCSV(csvText);
        
        monstersList = [...new Set(monsterData.map(d => d.monsterName))];
        loading.style.display = 'none';
        render();
    } catch (err) {
        loading.innerText = "Error: " + err.message;
    }
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    lines.forEach(line => {
        const row = line.split(',');
        if (row.length < 3) return;
        const traits = row.slice(3).map(t => t.trim()).filter(t => t !== "");
        monsterData.push({
            monsterName: row[0].trim(),
            type: row[1].trim(),
            skillName: row[2].trim(),
            traits
        });
    });
}

function render() {
    ctx.fillStyle = UI.colors.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const startX = (canvas.width - (UI.slotWidth * 5 + UI.margin * 4)) / 2;

    slots.forEach((slot, i) => {
        const x = startX + i * (UI.slotWidth + UI.margin);
        drawSlot(slot, i, x, 30);
    });

    if (activeDropdown) {
        drawDropdown();
    }
}

function drawSlot(slot, idx, x, y) {
    ctx.fillStyle = UI.colors.slot;
    ctx.beginPath();
    ctx.roundRect(x, y, UI.slotWidth, canvas.height - 60, 12);
    ctx.fill();

    // 몬스터 선택
    drawDropdownButton(x + 10, y + 20, UI.slotWidth - 20, 40, slot.name || "몬스터 선택", UI.colors.primary);

    if (slot.name) {
        let currentY = y + 80;
        const monsterSkills = monsterData.filter(d => d.monsterName === slot.name);
        const activePool = monsterSkills.filter(s => s.type === '액티브');
        const passivePool = monsterSkills.filter(s => s.type === '패시브');

        // 액티브 스킬 섹션
        ctx.fillStyle = UI.colors.active;
        ctx.font = "bold 14px Arial";
        ctx.fillText("액티브 스킬", x + 15, currentY);
        currentY += 15;

        slot.actives.forEach((skill, sIdx) => {
            drawDropdownButton(x + 10, currentY, UI.slotWidth - 20, 32, skill.name || "스킬 선택", "#333", true);
            currentY += 38;
            
            if (skill.name) {
                const skillInfo = activePool.find(p => p.skillName === skill.name);
                if (skillInfo) {
                    for(let tPos = 0; tPos < 3; tPos++) {
                        const tIdx = skill.traits[tPos];
                        const tName = (tIdx !== undefined && tIdx !== null) ? skillInfo.traits[tIdx] : "특성 선택";
                        drawDropdownButton(x + 15, currentY, UI.slotWidth - 30, 26, tName, "#1a1a1a", true, true);
                        currentY += 30;
                    }
                }
                currentY += 5;
            } else {
                currentY += 10;
            }
        });

        currentY += 15;

        // 패시브 스킬 섹션
        ctx.fillStyle = UI.colors.passive;
        ctx.fillText("패시브 스킬", x + 15, currentY);
        currentY += 15;

        slot.passives.forEach((skill, sIdx) => {
            drawDropdownButton(x + 10, currentY, UI.slotWidth - 20, 32, skill.name || "스킬 선택", "#333", true);
            currentY += 38;
            
            if (skill.name) {
                const skillInfo = passivePool.find(p => p.skillName === skill.name);
                if (skillInfo) {
                    const tName = (skill.trait !== null) ? skillInfo.traits[skill.trait] : "특성 선택";
                    drawDropdownButton(x + 15, currentY, UI.slotWidth - 30, 26, tName, "#1a1a1a", true, true);
                    currentY += 30;
                }
                currentY += 5;
            } else {
                currentY += 10;
            }
        });
    }
}

function drawDropdownButton(x, y, w, h, text, color, isSmall = false, isTrait = false) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 6);
    ctx.fill();

    if(isTrait && text !== "특성 선택") {
        ctx.strokeStyle = UI.colors.trait;
        ctx.lineWidth = 1;
        ctx.stroke();
    }

    ctx.fillStyle = (isTrait && text === "특성 선택") ? UI.colors.textDim : "#fff";
    ctx.font = isSmall ? "11px Arial" : "bold 15px Arial";
    ctx.textAlign = "left";
    const displayRepo = text.length > 18 ? text.substring(0, 17) + ".." : text;
    ctx.fillText(displayRepo, x + 10, y + h / 2 + 4);
    
    // 화살표
    ctx.beginPath();
    ctx.moveTo(x + w - 15, y + h / 2 - 2);
    ctx.lineTo(x + w - 10, y + h / 2 + 3);
    ctx.lineTo(x + w - 5, y + h / 2 - 2);
    ctx.strokeStyle = (isTrait && text === "특성 선택") ? UI.colors.textDim : "#fff";
    ctx.lineWidth = 1.5;
    ctx.stroke();
}

function drawDropdown() {
    const { x, y, width, items } = activeDropdown;
    const itemHeight = 30;
    const height = Math.min(items.length * itemHeight, 400);

    ctx.save();
    ctx.shadowBlur = 15;
    ctx.shadowColor = "rgba(0,0,0,0.5)";
    ctx.fillStyle = UI.colors.dropdown;
    ctx.beginPath();
    ctx.roundRect(x, y, width, height, 8);
    ctx.fill();
    ctx.restore();

    ctx.save();
    // 아이템이 많을 경우를 대비한 클리핑 처리 (간단하게 구현)
    items.slice(0, 13).forEach((item, i) => {
        const iy = y + i * itemHeight;
        ctx.fillStyle = "#fff";
        ctx.font = "12px Arial";
        const label = item.name !== undefined ? item.name : item;
        const displayLabel = label.length > 25 ? label.substring(0, 23) + ".." : label;
        ctx.fillText(displayLabel, x + 12, iy + 20);
        
        if (i < items.length - 1) {
            ctx.strokeStyle = "#444";
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(x, iy + itemHeight);
            ctx.lineTo(x + width, iy + itemHeight);
            ctx.stroke();
        }
    });
    ctx.restore();
}

canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (activeDropdown) {
        const { x, y, width, items, slotIdx, type, skillIdx, traitSlotIdx } = activeDropdown;
        const itemHeight = 30;
        const height = Math.min(items.length * itemHeight, 400);

        if (mx >= x && mx <= x + width && my >= y && my <= y + height) {
            const clickedIdx = Math.floor((my - y) / itemHeight);
            const selectedItem = items[clickedIdx];
            handleDropdownSelect(slotIdx, type, selectedItem, skillIdx, traitSlotIdx);
            activeDropdown = null;
            render();
            return;
        }
        activeDropdown = null;
        render();
        return;
    }

    const startX = (canvas.width - (UI.slotWidth * 5 + UI.margin * 4)) / 2;
    slots.forEach((slot, i) => {
        const x = startX + i * (UI.slotWidth + UI.margin);
        const y = 30;

        // 몬스터 선택
        if (mx > x + 10 && mx < x + UI.slotWidth - 10 && my > y + 20 && my < y + 60) {
            const usedMonsters = slots.map(s => s.name).filter(n => n && n !== slot.name);
            const filteredMonsters = monstersList.filter(m => !usedMonsters.includes(m));
            activeDropdown = { slotIdx: i, type: 'monster', items: filteredMonsters, x: mx, y: my, width: 180 };
        }

        if (slot.name) {
            let currentY = y + 95;
            const monsterSkills = monsterData.filter(d => d.monsterName === slot.name);
            
            // 액티브
            slot.actives.forEach((skill, sIdx) => {
                if (mx > x + 10 && mx < x + UI.slotWidth - 10 && my > currentY && my < currentY + 32) {
                    const usedInSlot = slot.actives.map(a => a.name).filter(n => n && n !== skill.name);
                    const pool = monsterSkills.filter(s => s.type === '액티브' && !usedInSlot.includes(s.skillName)).map(s => s.skillName);
                    activeDropdown = { slotIdx: i, type: 'active', items: pool, x: mx, y: my, width: 180, skillIdx: sIdx };
                }
                currentY += 38;
                if (skill.name) {
                    const skillInfo = monsterSkills.find(p => p.skillName === skill.name);
                    for(let tPos = 0; tPos < 3; tPos++) {
                        if (mx > x + 15 && mx < x + UI.slotWidth - 15 && my > currentY && my < currentY + 26) {
                            const availableTraits = skillInfo.traits.map((t, idx) => ({ name: t, id: idx }))
                                .filter(t => !skill.traits.includes(t.id) || skill.traits[tPos] === t.id);
                            activeDropdown = { slotIdx: i, type: 'activeTrait', items: availableTraits, x: mx, y: my, width: 220, skillIdx: sIdx, traitSlotIdx: tPos };
                        }
                        currentY += 30;
                    }
                    currentY += 5;
                } else {
                    currentY += 10;
                }
            });

            currentY += 30;

            // 패시브
            slot.passives.forEach((skill, sIdx) => {
                if (mx > x + 10 && mx < x + UI.slotWidth - 10 && my > currentY && my < currentY + 32) {
                    const usedInSlot = slot.passives.map(p => p.name).filter(n => n && n !== skill.name);
                    const pool = monsterSkills.filter(s => s.type === '패시브' && !usedInSlot.includes(s.skillName)).map(s => s.skillName);
                    activeDropdown = { slotIdx: i, type: 'passive', items: pool, x: mx, y: my, width: 180, skillIdx: sIdx };
                }
                currentY += 38;
                if (skill.name) {
                    const skillInfo = monsterSkills.find(p => p.skillName === skill.name);
                    if (mx > x + 15 && mx < x + UI.slotWidth - 15 && my > currentY && my < currentY + 26) {
                        const availableTraits = skillInfo.traits.map((t, idx) => ({ name: t, id: idx }));
                        activeDropdown = { slotIdx: i, type: 'passiveTrait', items: availableTraits, x: mx, y: my, width: 220, skillIdx: sIdx };
                    }
                    currentY += 30;
                } else {
                    currentY += 10;
                }
            });
        }
    });
    render();
});

function handleDropdownSelect(slotIdx, type, value, skillIdx, traitSlotIdx) {
    if (type === 'monster') {
        slots[slotIdx].name = value;
        slots[slotIdx].actives = Array.from({ length: 3 }, () => ({ name: null, traits: [] }));
        slots[slotIdx].passives = Array.from({ length: 3 }, () => ({ name: null, trait: null }));
    } else if (type === 'active') {
        slots[slotIdx].actives[skillIdx] = { name: value, traits: [] };
    } else if (type === 'passive') {
        slots[slotIdx].passives[skillIdx] = { name: value, trait: null };
    } else if (type === 'activeTrait') {
        slots[slotIdx].actives[skillIdx].traits[traitSlotIdx] = value.id;
    } else if (type === 'passiveTrait') {
        slots[slotIdx].passives[skillIdx].trait = value.id;
    }
}

function saveData() {
    localStorage.setItem('monster_slots_v2', JSON.stringify(slots));
    showToast("설정이 저장되었습니다.");
}

function loadData() {
    const saved = localStorage.getItem('monster_slots_v2');
    if (saved) {
        slots = JSON.parse(saved);
        render();
        showToast("설정을 불러왔습니다.");
    } else {
        showToast("저장된 데이터가 없습니다.");
    }
}

function resetAll() {
    if(confirm("모든 데이터를 초기화할까요?")) {
        slots = Array.from({ length: 5 }, () => ({
            name: null,
            actives: Array.from({ length: 3 }, () => ({ name: null, traits: [] })),
            passives: Array.from({ length: 3 }, () => ({ name: null, trait: null }))
        }));
        render();
    }
}

function showToast(msg) {
    const toast = document.createElement('div');
    toast.innerText = msg;
    toast.style = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; z-index:1000; font-size:14px;";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

init();
</script>
</body>
</html>
