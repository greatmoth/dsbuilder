<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Skill DB Builder</title>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow-x: hidden; }
        #header { width: 100%; padding: 15px; background: #1f1f1f; display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 10; }
        button { padding: 8px 16px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; }
        .btn-save { background: #4a90e2; color: white; }
        .btn-load { background: #43a047; color: white; }
        .btn-reset { background: #e53935; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        canvas { background: #181818; box-shadow: 0 4px 20px rgba(0,0,0,0.5); margin: 20px 0; cursor: default; border-radius: 12px; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 100; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="loading" class="loading-overlay">데이터를 분석하고 UI를 구성 중입니다...</div>

<div id="header">
    <button class="btn-save" onclick="saveData()">설정 저장</button>
    <button class="btn-load" onclick="loadData()">불러오기</button>
    <button class="btn-reset" onclick="resetAll()">초기화</button>
</div>

<canvas id="appCanvas"></canvas>

<script>
const canvas = document.getElementById('appCanvas');
const ctx = canvas.getContext('2d');
const loading = document.getElementById('loading');

// --- 데이터 및 상태 ---
let monsterData = []; 
let monstersList = []; // 유니크 몬스터 이름 목록
// 5개의 슬롯 상태 관리
let slots = Array.from({ length: 5 }, () => ({
    name: null,
    actives: [], // { name, traits: [] }
    passives: [] // { name, trait: null }
}));

// 드롭다운 상태
let activeDropdown = null; // { slotIdx, type, items, x, y, width, skillIdx }

const UI = {
    canvasWidth: 1300,
    canvasHeight: 950,
    slotWidth: 240,
    margin: 15,
    colors: {
        bg: "#181818",
        slot: "#252525",
        dropdown: "#333333",
        dropdownHover: "#444444",
        primary: "#4a90e2",
        active: "#4caf50",
        passive: "#ff9800",
        text: "#ffffff",
        textDim: "#aaaaaa",
        traitSelected: "#f1c40f"
    }
};

async function init() {
    canvas.width = UI.canvasWidth;
    canvas.height = UI.canvasHeight;

    try {
        const response = await fetch('mondb.csv'); 
        if (!response.ok) throw new Error("파일 로드 실패");
        
        const csvText = await response.text();
        parseCSV(csvText);
        
        monstersList = [...new Set(monsterData.map(d => d.monsterName))];
        loading.style.display = 'none';
        render();
    } catch (err) {
        loading.innerText = "Error: " + err.message;
    }
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    lines.forEach(line => {
        const row = line.split(',');
        if (row.length < 3) return;
        const traits = row.slice(3).map(t => t.trim()).filter(t => t !== "");
        monsterData.push({
            monsterName: row[0].trim(),
            type: row[1].trim(),
            skillName: row[2].trim(),
            traits
        });
    });
}

function render() {
    ctx.fillStyle = UI.colors.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const startX = (canvas.width - (UI.slotWidth * 5 + UI.margin * 4)) / 2;

    slots.forEach((slot, i) => {
        const x = startX + i * (UI.slotWidth + UI.margin);
        drawSlot(slot, i, x, 30);
    });

    if (activeDropdown) {
        drawDropdown();
    }
}

function drawSlot(slot, idx, x, y) {
    // 슬롯 배경
    ctx.fillStyle = UI.colors.slot;
    ctx.beginPath();
    ctx.roundRect(x, y, UI.slotWidth, canvas.height - 60, 12);
    ctx.fill();

    // 슬롯 번호
    ctx.fillStyle = "#444";
    ctx.font = "bold 40px Arial";
    ctx.fillText(idx + 1, x + 15, y + 45);

    // 몬스터 선택 드롭다운 버튼
    drawDropdownButton(x + 10, y + 60, UI.slotWidth - 20, 40, slot.name || "몬스터 선택", UI.colors.primary);

    if (slot.name) {
        let currentY = y + 120;
        const monsterSkills = monsterData.filter(d => d.monsterName === slot.name);
        const activePool = monsterSkills.filter(s => s.type === '액티브');
        const passivePool = monsterSkills.filter(s => s.type === '패시브');

        // 액티브 스킬 섹션 (3개)
        ctx.fillStyle = UI.colors.active;
        ctx.font = "bold 14px Arial";
        ctx.fillText("액티브 스킬 (최대 3)", x + 15, currentY);
        currentY += 15;

        for (let sIdx = 0; sIdx < 3; sIdx++) {
            const skill = slot.actives[sIdx];
            drawDropdownButton(x + 10, currentY, UI.slotWidth - 20, 32, skill ? skill.name : "스킬 선택", "#333", true);
            
            if (skill) {
                currentY += 38;
                const skillInfo = activePool.find(p => p.skillName === skill.name);
                if (skillInfo) {
                    skillInfo.traits.forEach((t, tIdx) => {
                        const isPicked = skill.traits.includes(tIdx);
                        drawTraitButton(x + 15, currentY, UI.slotWidth - 30, 24, t, isPicked);
                        currentY += 28;
                    });
                }
                currentY += 10;
            } else {
                currentY += 40;
            }
        }

        currentY += 20;

        // 패시브 스킬 섹션 (3개)
        ctx.fillStyle = UI.colors.passive;
        ctx.fillText("패시브 스킬 (최대 3)", x + 15, currentY);
        currentY += 15;

        for (let sIdx = 0; sIdx < 3; sIdx++) {
            const skill = slot.passives[sIdx];
            drawDropdownButton(x + 10, currentY, UI.slotWidth - 20, 32, skill ? skill.name : "스킬 선택", "#333", true);
            
            if (skill) {
                currentY += 38;
                const skillInfo = passivePool.find(p => p.skillName === skill.name);
                if (skillInfo) {
                    skillInfo.traits.forEach((t, tIdx) => {
                        const isPicked = skill.trait === tIdx;
                        drawTraitButton(x + 15, currentY, UI.slotWidth - 30, 24, t, isPicked);
                        currentY += 28;
                    });
                }
                currentY += 10;
            } else {
                currentY += 40;
            }
        }
    }
}

function drawDropdownButton(x, y, w, h, text, color, isSmall = false) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 6);
    ctx.fill();

    ctx.fillStyle = "#fff";
    ctx.font = isSmall ? "12px Arial" : "bold 15px Arial";
    ctx.textAlign = "left";
    const displayRepo = text.length > 15 ? text.substring(0, 14) + ".." : text;
    ctx.fillText(displayRepo, x + 12, y + h / 2 + 5);
    
    // 화살표 아이콘
    ctx.beginPath();
    ctx.moveTo(x + w - 20, y + h / 2 - 2);
    ctx.lineTo(x + w - 15, y + h / 2 + 3);
    ctx.lineTo(x + w - 10, y + h / 2 - 2);
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.stroke();
}

function drawTraitButton(x, y, w, h, text, isPicked) {
    ctx.fillStyle = isPicked ? UI.colors.traitSelected : "#1a1a1a";
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 4);
    ctx.fill();
    
    ctx.strokeStyle = isPicked ? "transparent" : "#444";
    ctx.stroke();

    ctx.fillStyle = isPicked ? "#000" : UI.colors.textDim;
    ctx.font = "10px Arial";
    const shortText = text.length > 24 ? text.substring(0, 22) + ".." : text;
    ctx.fillText(shortText, x + 8, y + h / 2 + 4);
}

function drawDropdown() {
    const { x, y, width, items } = activeDropdown;
    const itemHeight = 35;
    const height = items.length * itemHeight;

    // 드롭다운 그림자 및 배경
    ctx.shadowBlur = 15;
    ctx.shadowColor = "rgba(0,0,0,0.5)";
    ctx.fillStyle = UI.colors.dropdown;
    ctx.beginPath();
    ctx.roundRect(x, y, width, height, 8);
    ctx.fill();
    ctx.shadowBlur = 0;

    items.forEach((item, i) => {
        const iy = y + i * itemHeight;
        
        ctx.fillStyle = "#fff";
        ctx.font = "13px Arial";
        ctx.fillText(item, x + 15, iy + 22);
        
        if (i < items.length - 1) {
            ctx.strokeStyle = "#444";
            ctx.beginPath();
            ctx.moveTo(x, iy + itemHeight);
            ctx.lineTo(x + width, iy + itemHeight);
            ctx.stroke();
        }
    });
}

// --- 클릭 핸들러 ---
canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    // 드롭다운 열려있을 때 처리
    if (activeDropdown) {
        const { x, y, width, items, slotIdx, type, skillIdx } = activeDropdown;
        const itemHeight = 35;
        if (mx >= x && mx <= x + width && my >= y && my <= y + items.length * itemHeight) {
            const clickedIdx = Math.floor((my - y) / itemHeight);
            const selectedValue = items[clickedIdx];
            handleDropdownSelect(slotIdx, type, selectedValue, skillIdx);
            activeDropdown = null;
            render();
            return;
        }
        activeDropdown = null;
        render();
        return;
    }

    // 슬롯 요소 클릭 감지
    const startX = (canvas.width - (UI.slotWidth * 5 + UI.margin * 4)) / 2;
    slots.forEach((slot, i) => {
        const x = startX + i * (UI.slotWidth + UI.margin);
        const y = 30;

        // 몬스터 선택 클릭
        if (mx > x + 10 && mx < x + UI.slotWidth - 10 && my > y + 60 && my < y + 100) {
            activeDropdown = { 
                slotIdx: i, type: 'monster', items: monstersList, 
                x: mx, y: my, width: 180 
            };
        }

        if (slot.name) {
            let currentY = y + 135;
            const monsterSkills = monsterData.filter(d => d.monsterName === slot.name);
            
            // 액티브 클릭 영역
            for(let sIdx = 0; sIdx < 3; sIdx++) {
                if (mx > x + 10 && mx < x + UI.slotWidth - 10 && my > currentY && my < currentY + 32) {
                    const actives = monsterSkills.filter(s => s.type === '액티브').map(s => s.skillName);
                    activeDropdown = { 
                        slotIdx: i, type: 'active', items: actives, 
                        x: mx, y: my, width: 180, skillIdx: sIdx 
                    };
                }
                
                const skill = slot.actives[sIdx];
                if (skill) {
                    currentY += 38;
                    const skillInfo = monsterSkills.find(p => p.skillName === skill.name && p.type === '액티브');
                    skillInfo?.traits.forEach((t, tIdx) => {
                        if (mx > x + 15 && mx < x + UI.slotWidth - 15 && my > currentY && my < currentY + 24) {
                            toggleTrait(i, 'active', sIdx, tIdx);
                        }
                        currentY += 28;
                    });
                    currentY += 10;
                } else {
                    currentY += 40;
                }
            }

            currentY += 35;

            // 패시브 클릭 영역
            for(let sIdx = 0; sIdx < 3; sIdx++) {
                if (mx > x + 10 && mx < x + UI.slotWidth - 10 && my > currentY && my < currentY + 32) {
                    const passives = monsterSkills.filter(s => s.type === '패시브').map(s => s.skillName);
                    activeDropdown = { 
                        slotIdx: i, type: 'passive', items: passives, 
                        x: mx, y: my, width: 180, skillIdx: sIdx 
                    };
                }

                const skill = slot.passives[sIdx];
                if (skill) {
                    currentY += 38;
                    const skillInfo = monsterSkills.find(p => p.skillName === skill.name && p.type === '패시브');
                    skillInfo?.traits.forEach((t, tIdx) => {
                        if (mx > x + 15 && mx < x + UI.slotWidth - 15 && my > currentY && my < currentY + 24) {
                            toggleTrait(i, 'passive', sIdx, tIdx);
                        }
                        currentY += 28;
                    });
                    currentY += 10;
                } else {
                    currentY += 40;
                }
            }
        }
    });
    render();
});

function handleDropdownSelect(slotIdx, type, value, skillIdx) {
    if (type === 'monster') {
        slots[slotIdx].name = value;
        slots[slotIdx].actives = [];
        slots[slotIdx].passives = [];
    } else if (type === 'active') {
        slots[slotIdx].actives[skillIdx] = { name: value, traits: [] };
    } else if (type === 'passive') {
        slots[slotIdx].passives[skillIdx] = { name: value, trait: null };
    }
}

function toggleTrait(slotIdx, type, skillIdx, traitIdx) {
    if (type === 'active') {
        const traits = slots[slotIdx].actives[skillIdx].traits;
        const foundIdx = traits.indexOf(traitIdx);
        if (foundIdx > -1) traits.splice(foundIdx, 1);
        else if (traits.length < 3) traits.push(traitIdx);
    } else {
        const current = slots[slotIdx].passives[skillIdx].trait;
        slots[slotIdx].passives[skillIdx].trait = (current === traitIdx) ? null : traitIdx;
    }
}

// --- 시스템 기능 ---
function saveData() {
    localStorage.setItem('monster_slots_save', JSON.stringify(slots));
    showToast("브라우저에 설정이 저장되었습니다.");
}

function loadData() {
    const saved = localStorage.getItem('monster_slots_save');
    if (saved) {
        slots = JSON.parse(saved);
        render();
        showToast("저장된 설정을 불러왔습니다.");
    } else {
        showToast("저장된 데이터가 없습니다.");
    }
}

function resetAll() {
    if(confirm("모든 슬롯을 초기화할까요?")) {
        slots = Array.from({ length: 5 }, () => ({ name: null, actives: [], passives: [] }));
        render();
    }
}

function showToast(msg) {
    const toast = document.createElement('div');
    toast.innerText = msg;
    toast.style = "position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:#fff; padding:10px 20px; border-radius:20px; z-index:1000; font-size:14px;";
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

init();
</script>
</body>
</html>
